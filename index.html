<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS 전광판</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* [1] 설정 화면: 여기에만 버튼이 존재 */
        #setup { padding: 20px; display: flex; flex-direction: column; gap: 12px; justify-content: center; height: 100%; box-sizing: border-box; }
        h1 { font-size: 1.5rem; text-align: center; color: #ffeb3b; margin: 0; }
        input, select, button { padding: 15px; border-radius: 10px; border: none; font-size: 1rem; width: 100%; box-sizing: border-box; }
        button { background: #4682FB; color: white; font-weight: bold; cursor: pointer; }
        
        /* 버튼 영역 */
        #profit-area { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; text-decoration: none; font-size: 0.9rem; text-align: center; display: flex; align-items: center; justify-content: center; }
        .kakao { background: #fee500; color: #3c1e1e; }
        .coupang { background: #0073e9; color: #fff; }

        /* [2] 전광판 화면: 오직 글자만! 버튼 절대 없음 */
        #display-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; align-items: center; white-space: nowrap; }
        #scrolling-text { font-size: 28vh; font-weight: 900; color: #ff0000; text-shadow: 0 0 20px #ff0000; animation: scroll-left linear infinite; }
        
        @keyframes scroll-left { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div id="setup">
        <h1>🚨 SOS 전광판 🚨</h1>
        <input type="text" id="customText" placeholder="탈출 메시지 직접 입력">
        <select id="preset">
            <option value="급똥 신호 옴! 붙잡으면 대참사 발생!!">급똥 신호</option>
            <option value="집에 가스레인지 켜놓고 옴! 제발 보내줘!">가스레인지</option>
            <option value="부장님 긴급 호출! 사무실 복귀해야 함!">부장님 호출</option>
            <option value="우리 집 강아지가 탈출했대요! 빨리 가야 함!">강아지 탈출</option>
        </select>
        <button onclick="startScroll()">전광판 가동</button>

        <div id="profit-area">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" class="btn kakao">🟡 개발자에게 커피후원</a>
            <a href="https://link.coupang.com/a/AF4757238" class="btn coupang">🔵 쿠팡검색</a>
        </div>
    </div>

    <div id="display-screen" onclick="stopScroll()">
        <div id="scrolling-text"></div>
    </div>

    <script>
        function startScroll() {
            const txt = document.getElementById('customText').value || document.getElementById('preset').value;
            const el = document.getElementById('scrolling-text');
            el.innerText = txt;
            el.style.animationDuration = (txt.length * 0.6 + 2) + "s";
            document.getElementById('display-screen').style.display = 'flex';
            
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }
        
        function stopScroll() { 
            document.getElementById('display-screen').style.display = 'none'; 
            if (document.exitFullscreen) document.exitFullscreen();
        }
        
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
